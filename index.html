<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coinbase | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff;
            color: #050f19;
            user-select: none; /* Prevents accidental text highlighting during the larp */
        }
        .cb-blue { color: #0052ff; }
        .cb-bg-blue { background-color: #0052ff; }
        .border-gray { border-color: #eceff1; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b border-gray p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="cb-bg-blue w-8 h-8 rounded-full flex items-center justify-center">
                <div class="bg-white w-3 h-3"></div>
            </div>
            <span class="font-bold text-xl tracking-tight">coinbase</span>
        </div>
        <div class="flex items-center space-x-4">
            <i class="fa-regular fa-bell text-xl"></i>
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xs">GS</div>
        </div>
    </nav>

    <div class="max-w-md mx-auto bg-white min-h-screen pb-24">
        
        <div class="p-6 pt-10">
            <div class="flex items-center space-x-2 mb-1">
                <p class="text-gray-500 font-medium">Total balance</p>
                <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
            </div>
            <h1 class="text-4xl font-bold mb-6 tracking-tight">$179,000.00</h1>
            
            <div class="grid grid-cols-4 gap-2 mb-8">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-plus cb-blue"></i>
                    </div>
                    <span class="text-xs font-semibold">Buy</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-minus cb-blue"></i>
                    </div>
                    <span class="text-xs font-semibold">Sell</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-arrow-up cb-blue"></i>
                    </div>
                    <span class="text-xs font-semibold">Send</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-arrow-down cb-blue"></i>
                    </div>
                    <span class="text-xs font-semibold">Receive</span>
                </div>
            </div>
        </div>

        <div class="h-[1px] bg-gray-100 mx-6"></div>

        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Your assets</h2>
            </div>

            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-[#F7931A] flex items-center justify-center mr-4">
                        <i class="fab fa-bitcoin text-white text-xl"></i>
                    </div>
                    <div>
                        <p class="font-bold">Bitcoin</p>
                        <p class="text-gray-500 text-sm">BTC</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold">$179,000.00</p>
                    <p class="text-gray-500 text-sm">2.3930 BTC</p>
                </div>
            </div>

            <div class="flex justify-between items-center py-4 border-t border-gray">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center mr-4 text-white font-bold">
                        $
                    </div>
                    <div>
                        <p class="font-bold">Cash</p>
                        <p class="text-gray-500 text-sm">USD</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold">$0.00</p>
                </div>
            </div>
        </div>

        <div class="px-6 py-4 bg-blue-50 mx-6 rounded-xl flex items-center justify-between">
            <div class="flex items-center">
                <i class="fa-solid fa-circle-check cb-blue mr-2 text-sm"></i>
                <span class="text-sm font-bold">Verified Account: <span class="cb-blue">GabeS</span></span>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray p-3 flex justify-around items-center max-w-md mx-auto">
            <div class="flex flex-col items-center cb-blue">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Assets</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <div class="cb-bg-blue w-12 h-12 rounded-full flex items-center justify-center -mt-10 shadow-xl border-4 border-white">
                    <i class="fa-solid fa-right-left text-white text-lg"></i>
                </div>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-compass text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Explore</span>
            </div>
            <div class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-gear text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Settings</span>
            </div>
        </div>
    </div>

</body>
</html>
